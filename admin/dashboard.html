<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — SAT Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script>tailwind.config={theme:{extend:{colors:{'ocean-deep':'#03045E','ocean-dark':'#023E8A','ocean-mid':'#0077B6','ocean-teal':'#0096C7','sky-blue':'#00B4D8','foam-blue':'#ADE8F4','mist-blue':'#CAF0F8','coral-red':'#D62828'},fontFamily:{nunito:['Nunito','sans-serif']}}}}</script>
</head>
<body class="font-nunito bg-gray-50 min-h-screen">
  <div id="toast-container"></div>

  <!-- Admin nav -->
  <nav class="bg-ocean-deep text-white px-6 py-3 flex items-center justify-between">
    <div>
      <span class="font-black text-lg">🪼 SAT Admin</span>
      <span class="text-xs text-sky-blue ml-2">Sứa Khám Phá 2026B</span>
    </div>
    <div class="flex items-center gap-4">
      <a href="members.html"    class="text-foam-blue text-sm hover:text-white">Members</a>
      <a href="teams.html"      class="text-foam-blue text-sm hover:text-white">Teams</a>
      <a href="questions.html"  class="text-foam-blue text-sm hover:text-white">Questions</a>
      <a href="projector.html"  class="text-foam-blue text-sm hover:text-white">Projector</a>
      <button onclick="doSignOut()" class="btn-danger btn-sm">Sign Out</button>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-black text-ocean-dark mb-6">📊 Dashboard</h1>

    <div id="loading" class="text-center py-10"><div class="spinner mx-auto"></div></div>

    <!-- Stats grid -->
    <div id="stats-grid" class="hidden grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="card p-4 text-center">
        <p class="text-3xl font-black text-ocean-mid" id="stat-registered">0</p>
        <p class="text-sm text-gray-500 mt-1">Registered</p>
      </div>
      <div class="card p-4 text-center">
        <p class="text-3xl font-black text-green-600" id="stat-checkedin">0</p>
        <p class="text-sm text-gray-500 mt-1">Checked-in</p>
      </div>
      <div class="card p-4 text-center">
        <p class="text-3xl font-black text-sky-blue" id="stat-badges">0</p>
        <p class="text-sm text-gray-500 mt-1">Badges Unlocked</p>
      </div>
      <div class="card p-4 text-center">
        <p class="text-3xl font-black text-coral-red" id="stat-teams">0</p>
        <p class="text-sm text-gray-500 mt-1">Teams Formed</p>
      </div>
    </div>

    <!-- Badge breakdown -->
    <div id="badge-breakdown" class="hidden card p-5 mb-6">
      <h2 class="font-black text-ocean-dark mb-4">Badge Progress</h2>
      <div id="badge-bars" class="space-y-3"></div>
    </div>

    <!-- Event phase control -->
    <div class="card p-5 mb-6">
      <h2 class="font-black text-ocean-dark mb-3">⚡ Event Phase Control</h2>
      <select id="phase-select" class="input-field mb-3">
        <option value="registration">Registration / Check-in</option>
        <option value="archive-pearl">Archive Pearl Mission</option>
        <option value="sat-quiz">SAT Ocean Map Quiz</option>
        <option value="bol">Meet Your Sea Captains (BOL)</option>
        <option value="find-fellow">Find Your Fellow Sứa</option>
        <option value="team-formation">Random Team Formation</option>
        <option value="bonding">Team Bonding Challenge</option>
        <option value="completed">Event Completed 🎉</option>
      </select>
      <div class="flex gap-2 flex-wrap">
        <button onclick="savePhase()" class="btn-primary btn-sm" style="width:auto;display:inline-block">Update Phase</button>
        <label class="flex items-center gap-2 text-sm font-semibold text-ocean-dark cursor-pointer">
          <input type="checkbox" id="lb-visible" class="w-4 h-4 accent-ocean-mid" onchange="toggleLeaderboard()">
          Leaderboard Visible
        </label>
        <label class="flex items-center gap-2 text-sm font-semibold text-ocean-dark cursor-pointer">
          <input type="checkbox" id="reg-open" class="w-4 h-4 accent-ocean-mid" onchange="toggleRegistration()">
          Registration Open
        </label>
      </div>
    </div>

    <!-- Quick links -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <a href="members.html"   class="card p-4 text-center hover:bg-mist-blue transition-colors block">👥<p class="font-bold text-sm mt-1 text-ocean-dark">Members</p></a>
      <a href="badges.html"    class="card p-4 text-center hover:bg-mist-blue transition-colors block">🏅<p class="font-bold text-sm mt-1 text-ocean-dark">Badges</p></a>
      <a href="teams.html"     class="card p-4 text-center hover:bg-mist-blue transition-colors block">🚢<p class="font-bold text-sm mt-1 text-ocean-dark">Teams</p></a>
      <a href="leaderboard.html" class="card p-4 text-center hover:bg-mist-blue transition-colors block">🏆<p class="font-bold text-sm mt-1 text-ocean-dark">Leaderboard</p></a>
      <a href="projector.html" class="card p-4 text-center hover:bg-mist-blue transition-colors block">📽️<p class="font-bold text-sm mt-1 text-ocean-dark">Projector</p></a>
      <a href="export.html"    class="card p-4 text-center hover:bg-mist-blue transition-colors block">📥<p class="font-bold text-sm mt-1 text-ocean-dark">Export</p></a>
      <a href="questions.html" class="card p-4 text-center hover:bg-mist-blue transition-colors block">📝<p class="font-bold text-sm mt-1 text-ocean-dark">Questions</p></a>
      <a href="../leaderboard.html" target="_blank" class="card p-4 text-center hover:bg-mist-blue transition-colors block">🔗<p class="font-bold text-sm mt-1 text-ocean-dark">View Site</p></a>
    </div>
  </div>

  <script type="module">
    import { auth } from '../js/firebase-config.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { db } from '../js/firebase-config.js';
    import { collection, getDocs, getDoc, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    onAuthStateChanged(auth, user => { if (!user) window.location.href = 'index.html'; });

    window.doSignOut = async function() { await signOut(auth); window.location.href = 'index.html'; };

    const BADGE_IDS = ['B01','B02','B03','B04','B05','B06','B07'];
    const BADGE_NAMES = { B01:'First Dive',B02:'Archive Pearl',B03:'SAT Map Reader',B04:'BOL Compass',B05:'Friendship Reef',B06:'Current Crew',B07:'Full Explorer' };

    async function load() {
      const [membersSnap, teamsSnap, settingsSnap] = await Promise.all([
        getDocs(collection(db,'members')),
        getDocs(collection(db,'teams')),
        getDoc(doc(db,'config','settings'))
      ]);

      const members  = membersSnap.docs.map(d=>({id:d.id,...d.data()}));
      const settings = settingsSnap.exists() ? settingsSnap.data() : {};

      document.getElementById('stat-registered').textContent = members.length;
      document.getElementById('stat-checkedin').textContent  = members.filter(m=>m.checkedIn).length;
      document.getElementById('stat-teams').textContent      = teamsSnap.size;

      // Count total badges unlocked across all members (lightweight estimate)
      let totalBadges = 0;
      const badgeCounts = {};
      BADGE_IDS.forEach(id => badgeCounts[id] = 0);

      // Load badge counts per member (batch for perf)
      const badgePromises = members.map(m => getDocs(collection(db,'members',m.id,'badges')));
      const badgeResults  = await Promise.all(badgePromises);
      badgeResults.forEach(snap => {
        snap.forEach(bd => { if(bd.data().unlocked){ totalBadges++; badgeCounts[bd.id]=(badgeCounts[bd.id]||0)+1; } });
      });

      document.getElementById('stat-badges').textContent = totalBadges;

      // Badge bars
      const barsEl = document.getElementById('badge-bars');
      barsEl.innerHTML = BADGE_IDS.map(id => {
        const pct = members.length ? Math.round((badgeCounts[id]/members.length)*100) : 0;
        return `
          <div>
            <div class="flex justify-between text-xs font-semibold text-ocean-dark mb-1">
              <span>${BADGE_NAMES[id]}</span>
              <span>${badgeCounts[id]}/${members.length} (${pct}%)</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>`;
      }).join('');

      // Phase
      if (settings.currentPhase) document.getElementById('phase-select').value = settings.currentPhase;
      document.getElementById('lb-visible').checked  = settings.leaderboardVisible || false;
      document.getElementById('reg-open').checked    = settings.registrationOpen !== false;

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('stats-grid').classList.remove('hidden');
      document.getElementById('badge-breakdown').classList.remove('hidden');
    }

    window.savePhase = async function() {
      const phase = document.getElementById('phase-select').value;
      await updateDoc(doc(db,'config','settings'), { currentPhase: phase });
      showToast(`Phase updated to: ${phase}`, 'success');
    };

    window.toggleLeaderboard = async function() {
      await updateDoc(doc(db,'config','settings'), { leaderboardVisible: document.getElementById('lb-visible').checked });
      showToast('Leaderboard visibility updated','success');
    };

    window.toggleRegistration = async function() {
      await updateDoc(doc(db,'config','settings'), { registrationOpen: document.getElementById('reg-open').checked });
      showToast('Registration setting updated','success');
    };

    function showToast(msg,type='info'){const c=document.getElementById('toast-container');const t=document.createElement('div');t.className=`toast toast-${type}`;t.textContent=msg;c.appendChild(t);setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3000);}

    load();
  </script>
</body>
</html>
