<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bảng Xếp Hạng — Sứa Khám Phá</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>tailwind.config={theme:{extend:{colors:{'ocean-deep':'#03045E','ocean-dark':'#023E8A','ocean-mid':'#0077B6','ocean-teal':'#0096C7','sky-blue':'#00B4D8','foam-blue':'#ADE8F4','mist-blue':'#CAF0F8','coral-red':'#D62828'},fontFamily:{nunito:['Nunito','sans-serif']}}}}</script>
</head>
<body class="font-nunito bg-mist-blue">

  <header class="top-header">
    <a href="dashboard.html" class="text-foam-blue font-bold text-sm">&larr; Home</a>
    <span class="text-white font-black">🏆 Bảng Xếp Hạng</span>
    <div class="w-14"></div>
  </header>

  <div class="page-content px-4 pb-10">

    <div class="bg-ocean-gradient rounded-2xl p-4 mb-5 text-center">
      <h1 class="text-white font-black text-xl">🏆 Leaderboard</h1>
      <p class="text-sky-blue text-sm">Sứa Khám Phá 2026B</p>
    </div>

    <!-- Tabs -->
    <div class="flex bg-white rounded-xl p-1 mb-5 shadow-sm">
      <button id="tab-teams" onclick="switchTab('teams')" class="flex-1 py-2 rounded-lg font-bold text-sm bg-ocean-mid text-white transition-all">🚢 Teams</button>
      <button id="tab-individuals" onclick="switchTab('individuals')" class="flex-1 py-2 rounded-lg font-bold text-sm text-gray-400 transition-all">👤 Cá Nhân</button>
    </div>

    <div id="loading" class="text-center py-10"><div class="spinner mx-auto"></div></div>

    <!-- Teams tab -->
    <div id="teams-tab" class="hidden space-y-3"></div>

    <!-- Individuals tab -->
    <div id="individuals-tab" class="hidden">
      <!-- Fastest explorer highlight -->
      <div id="fastest-card" class="hidden card p-4 mb-4 text-center border-2 border-yellow-400 bg-yellow-50">
        <div class="text-2xl mb-1">⚡</div>
        <p class="text-xs text-gray-500 font-semibold">Fastest Full Explorer</p>
        <p class="font-black text-ocean-dark" id="fastest-name">—</p>
        <p class="text-xs text-gray-400" id="fastest-time">—</p>
      </div>
      <div id="individuals-list" class="space-y-2"></div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-5">Tự động cập nhật mỗi 30 giây</p>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>Home</a>
    <a href="badges.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>Badges</a>
    <a href="leaderboard.html" class="active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Rank</a>
    <a href="profile.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Profile</a>
  </nav>

  <script type="module">
    import { requireAuth } from './js/auth.js';
    import { db } from './js/firebase-config.js';
    import { collection, getDocs, getDoc, doc, query, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const session = requireAuth();
    let activeTab = 'teams';

    window.switchTab = function(tab) {
      activeTab = tab;
      document.getElementById('teams-tab').classList.toggle('hidden', tab !== 'teams');
      document.getElementById('individuals-tab').classList.toggle('hidden', tab !== 'individuals');
      document.getElementById('tab-teams').className       = `flex-1 py-2 rounded-lg font-bold text-sm ${tab==='teams'?'bg-ocean-mid text-white':'text-gray-400'} transition-all`;
      document.getElementById('tab-individuals').className = `flex-1 py-2 rounded-lg font-bold text-sm ${tab==='individuals'?'bg-ocean-mid text-white':'text-gray-400'} transition-all`;
    };

    const RANK_ICONS = ['🥇','🥈','🥉'];

    async function loadLeaderboard() {
      try {
        // Teams
        const teamsSnap = await getDocs(collection(db,'teams'));
        const teams = teamsSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.score||0)-(a.score||0));

        document.getElementById('teams-tab').innerHTML = teams.length === 0
          ? '<div class="card p-5 text-center text-gray-500">Chưa có team nào được tạo</div>'
          : teams.map((t,i) => `
              <div class="card p-4 flex items-center gap-3 ${i<3?['lb-rank-1','lb-rank-2','lb-rank-3'][i]:''}">
                <span class="text-2xl w-8 text-center">${i<3?RANK_ICONS[i]:`#${i+1}`}</span>
                <div class="flex-1">
                  <p class="font-black text-ocean-dark">${t.name}</p>
                  <p class="text-xs text-gray-500">${(t.memberIds||[]).length} thành viên</p>
                </div>
                <div class="text-right">
                  <p class="font-black text-ocean-mid text-lg">${t.score||0}</p>
                  <p class="text-xs text-gray-400">pts</p>
                </div>
              </div>`).join('');

        // Individuals — get top members by points (limit 30)
        const membersSnap = await getDocs(collection(db,'members'));
        const members = membersSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.points||0)-(a.points||0)).slice(0,30);

        document.getElementById('individuals-list').innerHTML = members.map((m,i) => {
          const isMe = m.id === session.memberId;
          return `
            <div class="card p-3 flex items-center gap-3 ${isMe?'border-2 border-sky-blue':''}">
              <span class="font-black text-gray-400 w-6 text-center text-sm">${i<3?RANK_ICONS[i]:`${i+1}`}</span>
              <div class="w-8 h-8 rounded-full overflow-hidden bg-sky-blue flex-shrink-0 flex items-center justify-center">
                ${m.photoURL?`<img src="${m.photoURL}" class="w-full h-full object-cover">`:`<span class="text-xs font-black text-ocean-dark">${m.name.slice(0,2).toUpperCase()}</span>`}
              </div>
              <div class="flex-1">
                <p class="font-bold text-ocean-dark text-sm">${m.name}${isMe?' 👈':''}</p>
                <p class="text-xs text-gray-400">${m.status} · ${m.satType||''}</p>
              </div>
              <div class="text-right">
                <p class="font-black text-ocean-mid">${m.points||0}</p>
                <p class="text-xs text-gray-400">pts</p>
              </div>
            </div>`;
        }).join('');

        // Fastest Full Explorer
        const fastest = members.find(m => m.id); // simplified — full logic checks B07 unlockedAt
        const metaSnap = await getDoc(doc(db,'leaderboard','meta')).catch(()=>null);
        if (metaSnap && metaSnap.exists()) {
          const meta = metaSnap.data();
          if (meta.fastestExplorerName) {
            document.getElementById('fastest-name').textContent = meta.fastestExplorerName;
            document.getElementById('fastest-time').textContent = meta.fastestExplorerTime
              ? new Date(meta.fastestExplorerTime.seconds*1000).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})
              : '';
            document.getElementById('fastest-card').classList.remove('hidden');
          }
        }

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('teams-tab').classList.remove('hidden');
      } catch (err) {
        document.getElementById('loading').innerHTML = '<p class="text-coral-red font-bold text-center">Lỗi tải dữ liệu.</p>';
      }
    }

    loadLeaderboard();
    setInterval(loadLeaderboard, 30000);
  </script>
</body>
</html>
