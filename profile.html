<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hồ Sơ Sứa — Sứa Khám Phá</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>tailwind.config={theme:{extend:{colors:{'ocean-deep':'#03045E','ocean-dark':'#023E8A','ocean-mid':'#0077B6','ocean-teal':'#0096C7','sky-blue':'#00B4D8','foam-blue':'#ADE8F4','mist-blue':'#CAF0F8','coral-red':'#D62828'},fontFamily:{nunito:['Nunito','sans-serif']}}}}</script>
</head>
<body class="font-nunito bg-mist-blue">
  <div id="toast-container"></div>
  <div id="page-loader" class="page-loader hidden"><div class="spinner"></div><p>Đang lưu...</p></div>

  <!-- Header -->
  <header class="top-header">
    <a href="dashboard.html" class="text-foam-blue font-bold text-sm">&larr; Home</a>
    <span class="text-white font-black">Hồ Sơ Sứa</span>
    <button id="edit-btn" onclick="toggleEdit()" class="text-sky-blue font-bold text-sm">Chỉnh sửa</button>
  </header>

  <div class="page-content px-4 pb-10">

    <div id="loading" class="text-center py-16"><div class="spinner mx-auto"></div></div>

    <div id="profile-content" class="hidden">
      <!-- Photo + Name -->
      <div class="bg-ocean-gradient rounded-2xl p-6 mb-5 text-center">
        <div id="photo-wrap" class="relative inline-block mb-3">
          <div id="avatar" class="w-24 h-24 rounded-full border-4 border-sky-blue overflow-hidden mx-auto bg-sky-blue flex items-center justify-center">
            <span id="avatar-initials" class="text-ocean-dark font-black text-2xl"></span>
          </div>
          <label id="edit-photo-btn" class="hidden absolute bottom-0 right-0 bg-coral-red text-white rounded-full w-7 h-7 flex items-center justify-center cursor-pointer text-sm">
            📷
            <input id="photo-file" type="file" accept="image/*" class="hidden" onchange="handleNewPhoto(event)">
          </label>
        </div>
        <h2 class="text-white font-black text-xl" id="display-name"></h2>
        <div class="flex justify-center gap-2 mt-2 flex-wrap">
          <span class="chip chip-newbie" id="display-status"></span>
          <span class="chip chip-sat" id="display-sat-type"></span>
        </div>
        <div id="evo-display" class="mt-3 hidden">
          <span id="evo-emoji" class="evo-stage text-4xl"></span>
          <p id="evo-label" class="text-sky-blue text-xs font-bold mt-1"></p>
        </div>
      </div>

      <!-- Info card -->
      <div class="card p-5 mb-5">
        <h3 class="font-black text-ocean-dark mb-4">Thông tin cá nhân</h3>
        <div class="space-y-3">
          <div>
            <label class="label">Họ và tên</label>
            <p id="view-name" class="text-ocean-dark font-semibold"></p>
            <input id="edit-name" type="text" class="input-field hidden">
          </div>
          <div>
            <label class="label">Ngày sinh</label>
            <p id="view-dob" class="text-ocean-dark font-semibold"></p>
            <input id="edit-dob" type="date" class="input-field hidden">
          </div>
          <div>
            <label class="label">Ngành học</label>
            <p id="view-major" class="text-ocean-dark font-semibold"></p>
            <input id="edit-major" type="text" class="input-field hidden">
          </div>
          <div>
            <label class="label">Trường</label>
            <p id="view-school" class="text-ocean-dark font-semibold"></p>
            <input id="edit-school" type="text" class="input-field hidden">
          </div>
          <div>
            <label class="label">Fun Fact / Bio</label>
            <p id="view-bio" class="text-ocean-dark font-semibold text-sm leading-relaxed"></p>
            <textarea id="edit-bio" rows="3" maxlength="200" class="input-field hidden resize-none" style="height:auto" placeholder="Điều thú vị về bạn..."></textarea>
          </div>
        </div>
        <button id="save-btn" onclick="saveProfile()" class="btn-primary mt-5 hidden">💾 Lưu thay đổi</button>
      </div>

      <!-- Access Code + QR -->
      <div class="card p-5 mb-5 text-center">
        <h3 class="font-black text-ocean-dark mb-3">Mã Access Code của bạn</h3>
        <div class="access-code-box mb-3" id="access-code-display"></div>
        <button onclick="copyCode()" class="btn-secondary btn-sm mb-4">📋 Sao chép mã</button>
        <div id="qr-code" class="flex justify-center"></div>
        <p class="text-xs text-gray-500 mt-3">Dùng QR code này để bạn bè quét trong "Find Your Fellow Sứa"</p>
      </div>

      <!-- Logout -->
      <button onclick="doLogout()" class="btn-danger w-full mt-2">🚪 Đăng xuất</button>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="dashboard.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>Home</a>
    <a href="badges.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>Badges</a>
    <a href="leaderboard.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Rank</a>
    <a href="profile.html" class="active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Profile</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script type="module">
    import { requireAuth, clearSession, setSession } from './js/auth.js';
    import { db, compressToBase64 } from './js/firebase-config.js';
    import { doc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { getEvolutionStage } from './js/sfx.js';

    const session = requireAuth();
    let member = null;
    let editMode = false;
    let newPhotoBase64 = null;

    const SAT_LABELS = { spotlight:'⭐ Spotlight', flow:'🌊 Flow', care:'💙 Care', creative:'🎨 Creative', calm:'🧘 Calm' };

    async function load() {
      const snap = await getDoc(doc(db, 'members', session.memberId));
      if (!snap.exists()) { window.location.href = 'index.html'; return; }
      member = snap.data();

      // Avatar
      if (member.photoURL) {
        document.getElementById('avatar').innerHTML = `<img src="${member.photoURL}" class="w-full h-full object-cover">`;
      } else {
        const initials = member.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
        document.getElementById('avatar-initials').textContent = initials;
      }

      document.getElementById('display-name').textContent   = member.name;
      document.getElementById('display-status').textContent = member.status === 'newbie' ? '🐣 Newbie' : '🐠 Oldbie';
      document.getElementById('display-sat-type').textContent = SAT_LABELS[member.satType] || member.satType;

      document.getElementById('view-name').textContent   = member.name;
      document.getElementById('view-dob').textContent    = member.dateOfBirth || '—';
      document.getElementById('view-major').textContent  = member.major  || '—';
      document.getElementById('view-school').textContent = member.school || '—';
      document.getElementById('view-bio').textContent    = member.bio   || '—';

      document.getElementById('edit-name').value   = member.name;
      document.getElementById('edit-dob').value    = member.dateOfBirth || '';
      document.getElementById('edit-major').value  = member.major  || '';
      document.getElementById('edit-school').value = member.school || '';
      document.getElementById('edit-bio').value    = member.bio   || '';

      // Profile evolution
      const evo = getEvolutionStage(member.points || 0);
      const evoEmoji = document.getElementById('evo-emoji');
      evoEmoji.textContent = evo.emoji;
      evoEmoji.className   = `evo-stage ${evo.cls} text-4xl`;
      document.getElementById('evo-label').textContent = evo.vi;
      document.getElementById('evo-display').classList.remove('hidden');

      document.getElementById('access-code-display').textContent = member.accessCode;
      new QRCode(document.getElementById('qr-code'), { text: member.accessCode, width:160, height:160, colorDark:'#03045E', colorLight:'#CAF0F8' });

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('profile-content').classList.remove('hidden');
    }

    window.toggleEdit = function() {
      editMode = !editMode;
      const btn = document.getElementById('edit-btn');
      btn.textContent = editMode ? 'Huỷ' : 'Chỉnh sửa';
      ['name','dob','major','school','bio'].forEach(f => {
        document.getElementById(`view-${f}`).classList.toggle('hidden', editMode);
        document.getElementById(`edit-${f}`).classList.toggle('hidden', !editMode);
      });
      document.getElementById('save-btn').classList.toggle('hidden', !editMode);
      document.getElementById('edit-photo-btn').classList.toggle('hidden', !editMode);
    };

    window.handleNewPhoto = async function(e) {
      const file = e.target.files[0]; if (!file) return;
      newPhotoBase64 = await compressToBase64(file);
      document.getElementById('avatar').innerHTML = `<img src="${newPhotoBase64}" class="w-full h-full object-cover">`;
    };

    window.saveProfile = async function() {
      document.getElementById('page-loader').classList.remove('hidden');
      try {
        const updates = {
          name:        document.getElementById('edit-name').value.trim() || member.name,
          dateOfBirth: document.getElementById('edit-dob').value,
          major:       document.getElementById('edit-major').value.trim(),
          school:      document.getElementById('edit-school').value.trim(),
          bio:         document.getElementById('edit-bio').value.trim(),
        };
        if (newPhotoBase64) {
          updates.photoURL = newPhotoBase64;
        }
        await updateDoc(doc(db,'members',session.memberId), updates);
        setSession({ ...session, name: updates.name, photoURL: updates.photoURL || session.photoURL });
        showToast('Đã lưu thông tin!', 'success');
        document.getElementById('page-loader').classList.add('hidden');
        setTimeout(() => window.location.reload(), 800);
      } catch {
        showToast('Lỗi lưu. Thử lại nhé!', 'error');
        document.getElementById('page-loader').classList.add('hidden');
      }
    };

    window.copyCode = function() {
      navigator.clipboard.writeText(member.accessCode).then(()=>showToast('Đã sao chép mã!','success')).catch(()=>{});
    };

    window.doLogout = function() {
      if (confirm('Bạn có chắc muốn đăng xuất?')) {
        clearSession();
        window.location.href = 'index.html';
      }
    };

    function showToast(msg, type='info') {
      const c=document.getElementById('toast-container');
      const t=document.createElement('div'); t.className=`toast toast-${type}`; t.textContent=msg;
      c.appendChild(t); setTimeout(()=>t.classList.add('show'),10);
      setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3000);
    }

    load();
  </script>

  <script type="module">import('./js/ocean.js').then(m=>m.initOceanTheme())</script>
</body>
</html>
